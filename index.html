<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Batman Universe Character Gallery</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
    </head>

    <body class="d-flex flex-column min-vh-100">
        <!-- Navigation Bar -->
         <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container-lg">
                <a class="navbar-brand fw-bold" href="index.html"> Batman Universe Gallery</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="details.html">Details</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                        <li class="nav-item"><a class="nav-link" href="new-character-form.html">Add a Character</a></li>
                    </ul>
                </div>
            </div>
         </nav>

         <!-- Main Content -->
        <main class="flex-grow-1">
            <div class="container-lg py-5">
                <div class="page-header text-center mb-5 pb-4 border-bottom">
                    <h1 class="display-4 fw-bold">Batman Universe Character Gallery</h1>
                    <p class="lead text-muted">Discover the iconic heroes and villains of the Batman Universe.</p>
                </div>

                <!-- Search and Filter Section -->
                <div class="card mb-4">
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-9">
                                <input type="text" placeholder="Search by character name or role..."
                                    class="form-control form-control-lg">
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-secondary w-100">Clear</button>
                            </div>
                        </div>
                        <div class="filter-buttons d-flex flex-wrap gap-2">
                            <button class="btn btn-outline-primary active">All Characters</button>
                            <button class="btn btn-outline-primary">Vigilante Hero</button>
                            <button class="btn btn-outline-primary">Villain</button>
                            <button class="btn btn-outline-primary">Sidekick</button>
                            <button class="btn btn-outline-primary">Ally</button>
                        </div>
                    </div>
                </div>
                
            </div>

        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    </body>
</html>
